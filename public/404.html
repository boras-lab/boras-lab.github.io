<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Redirect to index.html, preserving the path as a query param
    var path = location.pathname + location.search + location.hash;
    location.replace('/?redirect=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
